# =============================================================================
# Nginx host config untuk server fetnet.techupi.id
# Letakkan file ini di server:
#   /etc/nginx/sites-available/fetnet.conf
# Lalu enable:
#   ln -s /etc/nginx/sites-available/fetnet.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Asumsi:
#   - Kode di-clone ke /var/www/fetnet
#   - `cd /var/www/fetnet && make up` sudah jalan (container fetnet-nginx
#     listen di host port 8088)
#   - DNS fetnet.techupi.id → IP server ini
# =============================================================================

# Opsional: redirect HTTP → HTTPS setelah TLS pasang (lihat blok di bawah).
# Saat ini config plain HTTP sesuai permintaan (APP_URL=http://...).

server {
    listen 80;
    listen [::]:80;
    server_name fetnet.techupi.id;

    # Body size besar (import xlsx, generated FET, dll.)
    client_max_body_size 50M;

    # Standard reverse-proxy headers ke container nginx (port 8088).
    location / {
        proxy_pass         http://127.0.0.1:8088;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;

        # Livewire long-poll + queued job notification kadang lambat
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # Reverb websocket (jika nanti FE pakai Echo + Reverb)
    location /app {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    access_log /var/log/nginx/fetnet.access.log;
    error_log  /var/log/nginx/fetnet.error.log warn;
}

