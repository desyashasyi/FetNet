services:
    app:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
            target: dev
            args:
                WWWUSER: ${WWWUSER:-1000}
                WWWGROUP: ${WWWGROUP:-1000}
        image: fetnet-app
        restart: unless-stopped
        container_name: fetnet-app
        working_dir: /var/www
        environment:
            BOOTSTRAP_APP: "1"
        ports:
            - "8001:8000"
            - "5175:5173"
        volumes:
            - .:/var/www
            - .docker/php/supervisord.conf:/etc/supervisord.conf
            - .docker/php/supervisor.conf:/etc/supervisor/conf.d/supervisor.conf
        dns:
            - 8.8.8.8
            - 1.1.1.1
        depends_on:
            mariadb:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - WebFPTE

    nginx:
        image: nginx:alpine
        container_name: fetnet-nginx
        restart: unless-stopped
        ports:
            - "8088:80"
        volumes:
            - .:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - WebFPTE

    mariadb:
        image: mariadb:11-ubi
        container_name: fetnet-mariadb
        restart: unless-stopped
        environment:
            MARIADB_DATABASE: ${DB_DATABASE:-fetnet}
            MARIADB_USER: ${DB_USERNAME:-fetnet}
            MARIADB_PASSWORD: ${DB_PASSWORD:-Ddw8436}
            MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-Ddw8436}
        volumes:
            - mariadb_data:/var/lib/mysql
        ports:
            - "3310:3306"
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - WebFPTE

    redis:
        image: redis:alpine
        container_name: fetnet-redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        networks:
            - WebFPTE

    worker-timetable:
        image: fetnet-app
        restart: unless-stopped
        working_dir: /var/www
        command: ["php", "artisan", "queue:work", "redis", "--queue=timetable,default", "--sleep=1", "--tries=1", "--timeout=600", "--memory=512"]
        volumes:
            - .:/var/www
        depends_on:
            mariadb:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - WebFPTE

volumes:
    mariadb_data:
    redis_data:

networks:
    WebFPTE:
        driver: bridge
